name: Release

# Build standalone spectecx binaries for the three platforms PLDI attendees
# realistically run on (macOS arm64, macOS x64, Linux x64), and attach them to
# a GitHub Release. Triggered on tag push or manually for prep-time verification.

on:
  push:
    tags:
      - 'v*'
      - 'tutorial-*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: darwin-arm64
          # ubuntu-22.04 (glibc 2.35) for wider compatibility with older laptops
          # than ubuntu-latest currently offers.
          - os: ubuntu-22.04
            target: linux-x64
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up OCaml
        uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: "5.1.1"
          opam-pin: false

      - name: Discover opam switch name
        run: echo "SWITCH=$(opam switch show -s)" >> $GITHUB_ENV

      - name: Install dependencies
        working-directory: spectec
        run: opam install . --deps-only --locked

      - name: Build
        run: make exe

      - name: Rename binary
        run: mv spectecx spectecx-${{ matrix.target }}

      - name: Smoke test
        run: ./spectecx-${{ matrix.target }} --help > /dev/null

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: spectecx-${{ matrix.target }}
          path: spectecx-${{ matrix.target }}

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
          body: |
            ## Download

            Pick the binary for your operating system:

            - **macOS Apple Silicon (M Series):** `spectecx-darwin-arm64`
            - **Linux x86_64:** `spectecx-linux-x64`
            - **macOS Intel:** build from source per the README, or run the
              Linux binary in a VM (UTM, Lima).
            - **Windows:** use WSL2 + the Linux binary.

            ## Install (Unix)

            ```bash
            curl -L -o spectecx https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/spectecx-<your-target>
            chmod +x spectecx
            ./spectecx --help
            ```

            ## macOS Gatekeeper

            If the binary was downloaded via a browser, macOS will quarantine
            it. Either right-click and choose Open the first time, or strip
            the attribute:

            ```bash
            xattr -d com.apple.quarantine spectecx
            ```
